                                        {calcMode === 'separate' && (
                                            <div className="accordion-section">
                                                <div className="accordion-header" onClick={() => toggleAcc('rx')}>
                                                    <span className="accordion-title">3. SITE FILE</span>
                                                    <Chevron open={acc.rx} />
                                                </div>
                                                {acc.rx && (
                                                    <div className="accordion-body">
                                                        <div style={{fontSize: '11px', fontWeight: 600, color: '#64748b', marginBottom: '8px', textAlign: 'center'}}>
Site File
                                                        </div>
                                                        <div className="dropzone" onClick={() => document.getElementById('rxF').click()}>
                                                            <Icons.Upload />
                                                            {rxFile ? <strong style={{ color: '#0f172a' }}>{rxFile.name}</strong> : <span>Drag & Drop or <span style={{ textDecoration: 'underline' }}>Browse</span></span>}
                                                            <span style={{ fontSize: '10px' }}>CSV · TXT · XLS · XLSX</span>
                                                            <input id="rxF" type="file" accept=".csv,.xlsx,.xls" onChange={e => handleFileUpload(e, 'rx')} style={{ display: 'none' }} />
                                                        </div>
                                                        {rxData.length > 0 && (
                                                            <div style={{ marginTop: '10px', textAlign: 'center', fontSize: '12px', fontWeight: 600, color: '#10b981' }}>
                                                                ✓ {rxData.length} records loaded
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </>
                                )}

                                {/* COLUMNS */}
                                {pfcTab === 'columns' && (
                                    <>
                                        <div className="accordion-section">
                                            <div className="accordion-header" onClick={() => toggleAcc('txMap')}>
                                                <span className="accordion-title">{calcMode === 'combined' ? '3.' : '4.'} {calcMode === 'combined' ? 'SOURCE MAPPING' : 'SECTOR MAPPING'}</span>
                                                <Chevron open={acc.txMap} />
                                            </div>
                                            {acc.txMap && (
                                                <div className="accordion-body">
                                                    {[
                                                        { k: 'site', l: 'Site' },
                                                        { k: 'sector', l: 'Sector' },
                                                        { k: 'lng', l: 'Longitude' },
                                                        { k: 'lat', l: 'Latitude' },
                                                        { k: 'az', l: 'Azimuth' }
                                                    ].map(item => (
                                                        <div className="form-group" key={item.k} style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '8px' }}>
                                                            <label style={{ margin: 0, flex: '0 0 80px', fontSize: '12px', whiteSpace: 'nowrap' }}>{item.l}</label>
                                                            <select className="form-control" style={{ flex: 1, minWidth: 0, textOverflow: 'ellipsis', overflow: 'hidden', whiteSpace: 'nowrap' }} value={txMap[item.k]} onChange={e => setTxMap({ ...txMap, [item.k]: e.target.value })}>
                                                                <option value="">Select...</option>{txCols.map(c => <option key={c} value={c}>{c}</option>)}
                                                            </select>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>

                                        {calcMode === 'separate' && (
                                            <div className="accordion-section">
                                                <div className="accordion-header" onClick={() => toggleAcc('rxMap')}>
                                                    <span className="accordion-title">5. SITE MAPPING</span>
                                                    <Chevron open={acc.rxMap} />
                                                </div>
                                                {acc.rxMap && (
                                                    <div className="accordion-body">
                                                        {[
                                                            { k: 'site', l: 'Site' },
                                                            { k: 'lng', l: 'Longitude' },
                                                            { k: 'lat', l: 'Latitude' }
                                                        ].map(item => (
                                                            <div className="form-group" key={item.k} style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '8px' }}>
                                                                <label style={{ margin: 0, flex: '0 0 80px', fontSize: '12px', whiteSpace: 'nowrap' }}>{item.l}</label>
                                                                <select className="form-control" style={{ flex: 1, minWidth: 0, textOverflow: 'ellipsis', overflow: 'hidden', whiteSpace: 'nowrap' }} value={rxMap[item.k]} onChange={e => setRxMap({ ...rxMap, [item.k]: e.target.value })}>
                                                                    <option value="">Select...</option>{rxCols.map(c => <option key={c} value={c}>{c}</option>)}
                                                                </select>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </>
                                )}

{/* STYLE */}
                                {pfcTab === 'style' && (
                                    <>
                                        <div className="accordion-section">
                                            <div className="accordion-header" onClick={() => toggleAcc('markerIcon')}>
                                                <span className="accordion-title">{calcMode === 'combined' ? '4.' : '6.'} MARKER ICONS</span>
                                                <Chevron open={acc.markerIcon} />
                                            </div>
                                            {acc.markerIcon && (
                                                <div className="accordion-body">
                                                    {calcMode === 'combined' ? (
                                                        <div style={{ background: '#ffffff', padding: '12px' }}>
                                                            <div className="style-row">
                                                                <span className="style-label">Marker Style</span>
                                                                <div className="icon-box-preview" onClick={() => { setPickerTarget('rx'); setPickerOpen(true); }}>
                                                                    {rxIcon.url && rxIcon.url !== 'VECTOR_CIRCLE' ? (

                                                                    ) : null}
                                                                    <div style={{ display: rxIcon.url === 'VECTOR_CIRCLE' || !rxIcon.url ? 'flex' : 'none', position: 'absolute', width: '12px', height: '12px', background: rxIcon.color, borderRadius: '50%' }}></div>
                                                                </div>
                                                            </div>
                                                            <div className="style-row" style={{marginTop: '20px'}}>
                                                                <span className="style-label">Global Icon Scale</span>
                                                                <span className="style-val">{markerScale.toFixed(1)}x</span>
                                                            </div>
                                                            <div>
                                                                <input type="range" className="thin-slider" min="0.5" max="3" step="0.1" value={markerScale} onChange={e => setMarkerScale(parseFloat(e.target.value))} />
                                                            </div>
                                                        </div>
                                                    ) : (
                                                        <div style={{ background: '#ffffff', padding: '12px' }}>
                                                            <div className="style-row">
                                                                <span className="style-label">TX Icon Style</span>
                                                                <div className="icon-box-preview" onClick={() => { setPickerTarget('tx'); setPickerOpen(true); }}>
                                                                    {txIcon.url && txIcon.url !== 'VECTOR_CIRCLE' ? (
                                                                        <img src={getIconUrl(txIcon.url)} style={{ maxWidth: '16px', maxHeight: '16px', objectFit: 'contain' }} onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }} />
                                                                    ) : null}
                                                                    <div style={{ display: txIcon.url === 'VECTOR_CIRCLE' || !txIcon.url ? 'flex' : 'none', position: 'absolute', width: '12px', height: '12px', background: txIcon.color, borderRadius: '50%' }}></div>
                                                                </div>

                                                            <div className="style-row" style={{marginBottom: '12px'}}>

                                                                    ) : null}
                                                                    <div style={{ display: rxIcon.url === 'VECTOR_CIRCLE' || !rxIcon.url ? 'flex' : 'none', position: 'absolute', width: '12px', height: '12px', background: rxIcon.color, borderRadius: '50%' }}></div>
                                                                </div>

                                                                <span className="style-label">Global Icon Scale</span>

                                                        </div>

                                                            <span className="style-label">Line Opacity</span>

                                                        </div>
                                                        <div>
                                                            <input type="range" className="thin-slider" min="0" max="100" value={lineOpacity} onChange={e => setLineOpacity(parseInt(e.target.value))} />
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                        <div className="accordion-section">
                                            <div className="accordion-header" onClick={() => toggleAcc('visibility')}>
                                                <span className="accordion-title">{calcMode === 'combined' ? '7.' : '9.'} VISIBILITY</span>
                                                <Chevron open={acc.visibility} />
                                            </div>
                                            {acc.visibility && (
                                                <div className="accordion-body">
                                                    <div style={{ background: '#ffffff', padding: '12px', display: 'flex', flexDirection: 'column', gap: '10px' }}>
                                                        {[  
                                                            ...(calcMode === 'separate' ? [{ label: 'TX Site Markers', val: showTxMarkers, set: setShowTxMarkers }] : []),
                                                            ...(calcMode === 'separate' ? [{ label: 'RX Site Markers', val: showRxMarkers, set: setShowRxMarkers }] : []),
                                                            { label: 'Site Labels',           val: showLabels,        set: setShowLabels },
                                                            { label: 'Beam Labels',           val: showBeamLabels,    set: setShowBeamLabels },
                                                            { label: 'Legend',                val: showLegend,        set: setShowLegend },
                                                        ].map(item => (
                                                            <div key={item.label} className="style-row" style={{ marginBottom: 0 }}>
                                                                <span className="style-label">{item.label}</span>
                                                                <label className="toggle-switch">
                                                                    <input type="checkbox" checked={item.val} onChange={e => item.set(e.target.checked)} />
                                                                    <span className="toggle-slider"></span>
                                                                </label>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </>
)}

                                {/* FILTER TAB */}
                                {pfcTab === 'filter' && (
                                    <>
                                {/* SEARCH & FILTER */}
                                <div className="accordion-section">
                                    <div className="accordion-header" onClick={() => toggleAcc('search')}>
                                        <span className="accordion-title">{calcMode === 'combined' ? '8.' : '10.'} SEARCH & FILTER</span>
                                        <Chevron open={acc.search} />
                                    </div>
                                    {acc.search && (
                                                <div className="accordion-body">
                                                    <div className="form-group">
                                                        <label>Search</label>
                                                        <div className="search-input-wrapper">
                                                            <span className="search-icon"><Icons.Search /></span>
                                                            <input type="text" className="form-control" placeholder="Search site..." value={filterSearch} onChange={e => setFilterSearch(e.target.value)} style={{ paddingLeft: '34px', paddingRight: '10px' }} />
                                                        </div>
                                                    </div>
                                                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px', marginBottom: '12px' }}>
                                                        <div className="form-group" style={{ marginBottom: 0 }}>
                                                            <label>Column Filter</label>
                                                            <select className="form-control" value={filterColumn} onChange={e => setFilterColumn(e.target.value)} style={{ paddingRight: '28px' }}>
                                                                <option value="">Select Column...</option>
                                                                {txCols.map(c => <option key={c} value={c}>{c}</option>)}
                                                            </select>
                                                        </div>
                                                        <div className="form-group" style={{ marginBottom: 0 }}>
                                                            <label>&nbsp;</label>
                                                            <select className="form-control" value={filterValue} onChange={e => setFilterValue(e.target.value)} style={{ paddingRight: '28px' }}>
                                                                <option value="">Select...</option>
                                                                {txCols.filter(c => c === filterColumn)[0] && txData.map(r => r[filterColumn]).filter((v, i, a) => v !== undefined && v !== null && a.indexOf(v) === i).map(v => <option key={v} value={v}>{v}</option>)}
                                                            </select>
                                                        </div>
                                                    </div>
                                                    <div className="form-group" style={{ marginBottom: 0 }}>
                                                        <label>Beam Match</label>
                                                        <select className="form-control" value={filterBeamMode} onChange={e => setFilterBeamMode(e.target.value)} style={{ paddingRight: '28px' }}>
                                                            <option value="all">All</option>
                                                            <option value="matched">Match</option>
                                                            <option value="unmatched">No Match</option>
                                                        </select>
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        <div className="accordion-section">
                                            <div className="accordion-header" onClick={() => toggleAcc('engine')}>
                                                <span className="accordion-title">{calcMode === 'combined' ? '9.' : '11.'} ANALYSIS ENGINE</span>
                                                <Chevron open={acc.engine} />
                                            </div>
                                            {acc.engine && (
                                                <div className="accordion-body">
                                                    
                                                    <div className="form-group">
                                                        <label style={{ display: 'flex', justifyContent: 'space-between' }}><span>Horizontal Beamwidth</span><span>{beamwidth}°</span></label>
                                                        <input type="range" className="thin-slider" min="10" max="360" value={beamwidth} onChange={e => setBeamwidth(parseInt(e.target.value))} />
                                                    </div>
                                                    <div className="form-group">
                                                        <label style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                                            <span>Beam Radius Display</span>
                                                            <select className="form-control" style={{ width: '80px', padding: '4px', fontSize: '11px' }} value={beamMode} onChange={e => setBeamMode(e.target.value)}>
                                                                <option value="fixed">Fixed</option><option value="auto">Auto</option>
                                                            </select>
                                                        </label>
                                                        {beamMode === 'fixed' && <div style={{ display: 'flex', gap: '8px', marginTop: '6px' }}><input type="range" className="thin-slider" min="100" max="10000" step="100" value={beamRadius} onChange={e => setBeamRadius(parseInt(e.target.value))} style={{ flex: 1 }} /><span style={{ fontSize: '11px' }}>{beamRadius}m</span></div>}
                                                    </div>
                                                    <div className="form-group">
                                                        <label>Max Nearest Neighbors (N)</label>
                                                        <input type="number" className="form-control" min="1" max="50" value={nNeighbors} onChange={e => setNNeighbors(parseInt(e.target.value))} />
                                                    </div>

                                                    <div className="form-group">
                                                        <label>Distance Limit & Unit</label>
                                                        <div style={{ display: 'flex', gap: '6px' }}>
                                                            <select className="form-control" style={{ width: '30%' }} value={distOp} onChange={e => setDistOp(e.target.value)}>
                                                                <option value="<">&lt;</option><option value="<=">&lt;=</option><option value="=">=</option><option value=">">&gt;</option><option value=">=">&gt;=</option>
                                                            </select>
                                                            <input type="number" className="form-control" style={{ width: '40%' }} placeholder="Limit..." value={maxDist} onChange={e => setMaxDist(e.target.value)} />
                                                            <select className="form-control" style={{ width: '30%' }} value={distUnit} onChange={e => setDistUnit(e.target.value)}>
                                                                <option value="km">km</option><option value="m">m</option><option value="mi">mi</option><option value="ft">ft</option>
                                                            </select>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        <div className="accordion-section">
                                            <div className="accordion-header" onClick={() => toggleAcc('actions')}>
                                                <span className="accordion-title">{calcMode === 'combined' ? '10.' : '12.'} ACTIONS</span>
                                                <Chevron open={acc.actions} />
                                            </div>
                                            {acc.actions && (
                                                <div className="accordion-body">
                                                    {calcProgress > 0 && (
                                                        <div style={{ marginBottom: '12px' }}>
                                                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '4px' }}>
                                                                <span style={{ fontSize: '11px', fontWeight: 600, color: '#334155' }}>Processing...</span>
                                                                <span style={{ fontSize: '11px', fontWeight: 600, color: '#334155' }}>{calcProgress}%</span>
                                                            </div>
                                                            <div style={{ width: '100%', height: '6px', background: '#e2e8f0', borderRadius: '3px', overflow: 'hidden' }}>
                                                                <div style={{ width: calcProgress + '%', height: '100%', background: '#1e293b', borderRadius: '3px', transition: 'width 0.1s' }}></div>
                                                            </div>
                                                        </div>
                                                    )}
                                                    <button className="btn-primary-wide" onClick={calculate} style={{ marginBottom: '14px' }}>
                                                        <Icons.Zap /> Calculate & Draw
                                                    </button>
                                                    
                                                    <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', marginBottom: '14px' }}>
                                                        <button className="btn-export" disabled={txData.length === 0} onClick={exportKML}><Icons.Earth /> Export KML <span style={{position:'absolute', right:'12px', fontSize:'10px', color:'#94a3b8'}}>(Earth)</span></button>
                                                        <button className="btn-export" disabled={txData.length === 0} onClick={exportExcel}><Icons.FileSheet /> Export Excel <span style={{position:'absolute', right:'12px', fontSize:'10px', color:'#94a3b8'}}>(XLSX)</span></button>
                                                    </div>

                                                    <button className="btn-outline-red" onClick={clearData}>
                                                        <Icons.Trash /> Clear All Data
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>

                        {/* RIGHT CONTENT */}
                        <div className="map-area">
                            <div style={{ flex: 1, width: '100%', height: '100%', position: 'relative' }}>
                                <MapLayerSwitcher mapStyle={mapStyle} onStyleChange={setMapStyle} />
                                <MapView 
                                    sidebarOpen={sidebarOpen}
                                    mapStyle={mapStyle} txSites={displayTxSites} rxSites={displayRxSites} results={displayResults} 
                                    beamwidth={beamwidth} beamRadiusKm={beamMode === 'fixed' ? beamRadius / 1000 : 0} 
                                    beamMatchColor={beamMatchColor} beamNoMatchColor={beamNoMatchColor} lineColor={lineColor} lineThickness={lineThickness} 
                                    lineOpacity={lineOpacity} fillOpacity={fillOpacity} txIcon={txIcon} rxIcon={rxIcon} markerScale={markerScale} 
                                    showLabels={showLabels} showLegend={showLegend} distanceUnit={distUnit}
                                    singleIconMode={calcMode === 'combined'}
                                    showBeamsMatch={showBeamsMatch} showBeamsNoMatch={showBeamsNoMatch}
                                    showTxMarkers={showTxMarkers} showRxMarkers={showRxMarkers} showBeamLabels={showBeamLabels}
                                />
                            </div>
                        </div>
                    </div>

                    <ModernIconPicker 
                        isOpen={pickerOpen} 
                        onClose={() => setPickerOpen(false)} 
                        currentIcon={pickerTarget === 'tx' ? txIcon : rxIcon} 
                        onSelect={ic => pickerTarget === 'tx' ? setTxIcon(ic) : setRxIcon(ic)} 
                    />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
